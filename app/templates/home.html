{% extends "layout.html" %}
{% block content %}

<h3>Welcome to LLM Sentinel</h3>
<p>This tool helps you model your system and assess potential security threats layer by layer.</p>

<div class="row mt-4 mb-5">
  <div class="col-md-6 mb-4 mb-md-0">
    <div class="card h-100">
      <div class="card-header">
        <h5 class="mb-0">Last Analysis Summary</h5>
      </div>
      <div class="card-body d-flex flex-column">
        <ul class="list-group list-group-flush mb-4 flex-grow-1">
          <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent border-secondary">
            <strong>High Risk</strong>
            <span class="badge bg-danger rounded-pill">3</span>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent border-secondary">
            <strong>Medium Risk</strong>
            <span class="badge bg-warning rounded-pill text-dark">5</span>
          </li>
          <li class="list-group-item d-flex justify-content-between align-items-center bg-transparent border-secondary">
            <strong>Low Risk</strong>
            <span class="badge bg-success rounded-pill">2</span>
          </li>
        </ul>
        <div class="mt-auto">
          <a href="{{ url_for('main.llm_sec') }}" class="btn btn-primary btn-lg w-100">Start New
            Analysis &rarr;</a>
        </div>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card h-100">
      <div class="card-body d-flex align-items-center justify-content-center">
        <div style="width: 100%; max-width: 300px;">
          <canvas id="riskChart"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Include Chart.js from CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const ctx = document.getElementById('riskChart').getContext('2d');
  const riskChart = new Chart(ctx, {
    type: 'pie',
    data: {
      labels: ['High', 'Medium', 'Low'],
      datasets: [{
        label: 'Risk Distribution',
        data: [3, 5, 2],
        backgroundColor: ['#dc3545', '#ffc107', '#198754'],
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'bottom'
        }
      }
    }
  });
</script>

{% endblock %}
