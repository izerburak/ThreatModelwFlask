{% extends "layout.html" %}

{% block content %}
<div class="container mt-4">
    <h3 class="mb-4">Add New Question</h3>

    <div class="card shadow-sm mb-5">
        <div class="card-header">
            <h5 class="mb-0">Question Details</h5>
        </div>
        <div class="card-body">
            <div class="mb-4">
                <label for="questionText" class="form-label"><strong>Question Text</strong></label>
                <textarea id="questionText" class="form-control" rows="3"
                    placeholder="Enter your question here..."></textarea>
            </div>

            <div class="mb-4">
                <label class="form-label"><strong>Options</strong></label>
                <div id="optionsContainer">
                    <div class="option-input-group d-flex align-items-center mb-2">
                        <input type="text" class="form-control option-input" placeholder="Option 1">
                    </div>
                    <div class="option-input-group d-flex align-items-center mb-2">
                        <input type="text" class="form-control option-input" placeholder="Option 2">
                    </div>
                </div>
                <button type="button" class="btn btn-outline-primary btn-sm mt-2" id="addOptionBtn">
                    Add Option
                </button>
            </div>

            <div class="text-end border-top pt-4 mt-2">
                <button id="submitBtn" type="button" class="btn btn-primary px-4">Add Question</button>
            </div>

            <div id="statusMsg" class="mt-3"></div>
        </div>
    </div>
</div>

<script>
    const addOptionBtn = document.getElementById("addOptionBtn");
    const optionsContainer = document.getElementById("optionsContainer");
    const submitBtn = document.getElementById("submitBtn");
    const questionText = document.getElementById("questionText");
    const statusMsg = document.getElementById("statusMsg");
    let optionCount = 2;

    addOptionBtn.addEventListener("click", () => {
        optionCount += 1;
        const optionGroup = document.createElement("div");
        optionGroup.classList.add("option-input-group", "d-flex", "align-items-center", "mb-2");
        optionGroup.innerHTML = `
            <input type="text" class="form-control option-input me-2" placeholder="Option ${optionCount}">
            <button type="button" class="btn btn-outline-danger btn-sm removeOptionBtn">Remove</button>
        `;
        optionsContainer.appendChild(optionGroup);

        optionGroup.querySelector(".removeOptionBtn").addEventListener("click", () => {
            optionGroup.remove();
        });
    });

    submitBtn.addEventListener("click", async () => {
        statusMsg.textContent = "";
        const text = questionText.value.trim();
        if (!text) {
            statusMsg.textContent = "Please enter question text.";
            statusMsg.className = "text-danger";
            return;
        }

        const options = Array.from(document.querySelectorAll(".option-input"))
            .map((input) => input.value.trim())
            .filter((value) => value.length > 0);

        submitBtn.disabled = true;
        submitBtn.textContent = "Adding...";

        try {
            const response = await fetch("{{ url_for('main.add_question') }}", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, options }),
            });
            const payload = await response.json();
            if (response.ok && payload.ok) {
                statusMsg.className = "text-success";
                statusMsg.textContent = `Question ${payload.question.id} added to questionsDb.json.`;
                questionText.value = "";
                document.querySelectorAll(".option-input").forEach((input, index) => {
                    if (index >= 2) input.parentElement.remove();
                    else input.value = "";
                });
                optionCount = 2;
            } else {
                statusMsg.className = "text-danger";
                statusMsg.textContent = payload.error || "Failed to add question.";
            }
        } catch (error) {
            statusMsg.className = "text-danger";
            statusMsg.textContent = error.message || "Network error.";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Add Question";
        }
    });
</script>
{% endblock %}
